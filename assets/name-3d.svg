<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 140" width="900" height="140">
  <!-- Dark background -->
  <rect width="900" height="140" fill="#0d1117" rx="0"/>

  <!-- Ambient glow blobs -->
  <ellipse cx="200" cy="70" rx="180" ry="50" fill="#FF006E" opacity="0.04"/>
  <ellipse cx="700" cy="70" rx="180" ry="50" fill="#06FFB4" opacity="0.04"/>
  <ellipse cx="450" cy="70" rx="200" ry="60" fill="#8338EC" opacity="0.05"/>

  <defs>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FF006E"/>
      <stop offset="40%"  stop-color="#8338EC"/>
      <stop offset="100%" stop-color="#06FFB4"/>
    </linearGradient>
    <linearGradient id="subGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#8338EC"/>
      <stop offset="100%" stop-color="#06FFB4"/>
    </linearGradient>
  </defs>

  <!-- Floating group — SMIL float animation -->
  <g>
    <animateTransform
      attributeName="transform"
      type="translate"
      values="0,6; 0,-4; 0,6"
      dur="3.6s"
      repeatCount="indefinite"
      calcMode="spline"
      keyTimes="0;0.5;1"
      keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>

    <!-- 3D extrusion stack — back to front, stepping diagonally -->
    <text x="459" y="83" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="48" font-weight="900" fill="#0a001a">Abhinav Tarigoppula</text>
    <text x="457" y="81" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="48" font-weight="900" fill="#1a0033">Abhinav Tarigoppula</text>
    <text x="455" y="79" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="48" font-weight="900" fill="#2d0050">Abhinav Tarigoppula</text>
    <text x="453" y="77" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="48" font-weight="900" fill="#FF006E" opacity="0.18">Abhinav Tarigoppula</text>
    <text x="451" y="75" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="48" font-weight="900" fill="#8338EC" opacity="0.28">Abhinav Tarigoppula</text>
    <text x="449" y="73" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="48" font-weight="900" fill="#06FFB4" opacity="0.38">Abhinav Tarigoppula</text>

    <!-- Front face — gradient -->
    <text x="447" y="71" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="48" font-weight="900" fill="url(#nameGrad)">Abhinav Tarigoppula</text>

    <!-- Subtitle with letter spacing -->
    <text x="447" y="110" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="12" font-weight="400" fill="url(#subGrad)" letter-spacing="6">AI ENGINEER  &amp;  FULL-STACK DEVELOPER</text>
  </g>

  <!-- Decorative side lines -->
  <line x1="60" y1="71" x2="200" y2="71" stroke="url(#nameGrad)" stroke-width="1" opacity="0.4"/>
  <line x1="700" y1="71" x2="840" y2="71" stroke="url(#nameGrad)" stroke-width="1" opacity="0.4"/>
  <circle cx="60" cy="71" r="3" fill="#FF006E" opacity="0.7"/>
  <circle cx="840" cy="71" r="3" fill="#06FFB4" opacity="0.7"/>

  <!-- Blinking cursor after name -->
  <rect x="716" y="49" width="3" height="30" fill="#06FFB4">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
